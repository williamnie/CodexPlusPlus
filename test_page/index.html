<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codex++ Conversation Automation Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e; color: #e0e0e0; padding: 20px;
      max-width: 900px; margin: 0 auto;
    }
    h1 { font-size: 22px; margin-bottom: 20px; color: #00d4aa; }
    .section { background: #16213e; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
    .section h2 { font-size: 16px; color: #7ec8e3; margin-bottom: 12px; }
    label { display: block; font-size: 14px; color: #aaa; margin-bottom: 6px; }
    textarea {
      width: 100%; height: 120px; background: #0f3460; border: 1px solid #333;
      border-radius: 6px; color: #e0e0e0; padding: 12px; font-size: 14px;
      resize: vertical; font-family: inherit;
    }
    textarea:focus { outline: none; border-color: #00d4aa; }
    .btn {
      display: inline-block; padding: 10px 24px; border: none; border-radius: 6px;
      font-size: 14px; cursor: pointer; margin-top: 12px; font-weight: 600;
      transition: all 0.2s;
    }
    .btn-primary { background: #00d4aa; color: #000; }
    .btn-primary:hover { background: #00b894; }
    .btn-primary:disabled { background: #333; color: #666; cursor: not-allowed; }
    .btn-secondary { background: #333; color: #e0e0e0; margin-left: 8px; }
    .btn-secondary:hover { background: #444; }
    .status {
      display: inline-block; padding: 4px 12px; border-radius: 12px;
      font-size: 12px; font-weight: 600;
    }
    .status-idle { background: #333; color: #aaa; }
    .status-pending { background: #f39c12; color: #000; }
    .status-success { background: #27ae60; color: #fff; }
    .status-error { background: #e74c3c; color: #fff; }
    .result-box {
      background: #0f3460; border: 1px solid #333; border-radius: 6px;
      padding: 16px; margin-top: 12px; white-space: pre-wrap; font-size: 13px;
      line-height: 1.6; max-height: 400px; overflow-y: auto; display: none;
    }
    .history { margin-top: 12px; }
    .history-item {
      background: #0f3460; border-radius: 6px; padding: 12px; margin-bottom: 8px;
      border-left: 3px solid #333;
    }
    .history-item.success { border-left-color: #27ae60; }
    .history-item.error { border-left-color: #e74c3c; }
    .history-item .prompt { font-size: 13px; color: #7ec8e3; margin-bottom: 6px; }
    .history-item .response { font-size: 13px; color: #ccc; max-height: 100px; overflow: hidden; }
    .connection-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      margin-right: 6px;
    }
    .dot-green { background: #27ae60; }
    .dot-red { background: #e74c3c; }
    .dot-yellow { background: #f39c12; }
  </style>
</head>
<body>
  <h1>Codex++ Conversation Automation</h1>

  <div class="section">
    <h2>Connection</h2>
    <p>
      <span class="connection-dot" id="connDot"></span>
      <span id="connStatus">Checking...</span>
      <button class="btn btn-secondary" onclick="checkConnection()" style="margin-top:0; padding:4px 12px; font-size:12px;">Refresh</button>
    </p>
  </div>

  <div class="section">
    <h2>Send Message</h2>
    <label for="promptInput">Prompt:</label>
    <textarea id="promptInput" placeholder="Enter the message to send to Codex..."></textarea>
    <div style="margin-top: 8px;">
      <button class="btn btn-primary" id="sendBtn" onclick="sendMessage()">Send to Codex</button>
      <span class="status status-idle" id="statusBadge">Idle</span>
    </div>
  </div>

  <div class="section">
    <h2>Result</h2>
    <div class="result-box" id="resultBox"></div>
  </div>

  <div class="section">
    <h2>History</h2>
    <div class="history" id="history">
      <p style="color:#666; font-size:13px;">No messages sent yet.</p>
    </div>
  </div>

  <script>
    const API_BASE = "http://127.0.0.1:57321";
    let currentMsgId = null;
    let pollTimer = null;
    const historyItems = [];

    async function checkConnection() {
      const dot = document.getElementById("connDot");
      const status = document.getElementById("connStatus");
      try {
        const resp = await fetch(`${API_BASE}/health`, { signal: AbortSignal.timeout(3000) });
        if (resp.ok) {
          dot.className = "connection-dot dot-green";
          status.textContent = "Connected to helper server";
        } else {
          dot.className = "connection-dot dot-red";
          status.textContent = "Server error";
        }
      } catch (e) {
        dot.className = "connection-dot dot-red";
        status.textContent = "Cannot reach helper server (is Codex++ running?)";
      }
    }

    async function sendMessage() {
      const input = document.getElementById("promptInput");
      const prompt = input.value.trim();
      if (!prompt) return;

      const btn = document.getElementById("sendBtn");
      const badge = document.getElementById("statusBadge");
      const resultBox = document.getElementById("resultBox");

      btn.disabled = true;
      badge.className = "status status-pending";
      badge.textContent = "Sending...";
      resultBox.style.display = "none";

      try {
        const resp = await fetch(`${API_BASE}/api/send`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt }),
        });
        const data = await resp.json();
        if (data.ok) {
          currentMsgId = data.id;
          badge.textContent = "Waiting for response...";
          resultBox.textContent = "Message sent to Codex. Waiting for AI response...";
          resultBox.style.display = "block";
          startPolling(data.id, prompt);
        } else {
          badge.className = "status status-error";
          badge.textContent = "Failed";
          btn.disabled = false;
        }
      } catch (e) {
        badge.className = "status status-error";
        badge.textContent = "Error: " + e.message;
        btn.disabled = false;
      }
    }

    function startPolling(msgId, prompt) {
      if (pollTimer) clearInterval(pollTimer);
      const badge = document.getElementById("statusBadge");
      const resultBox = document.getElementById("resultBox");
      const btn = document.getElementById("sendBtn");

      pollTimer = setInterval(async () => {
        try {
          const resp = await fetch(`${API_BASE}/api/result/${msgId}`);
          const data = await resp.json();

          if (data.status === "success") {
            clearInterval(pollTimer);
            pollTimer = null;
            badge.className = "status status-success";
            badge.textContent = "Done";
            resultBox.textContent = data.content;
            btn.disabled = false;
            addHistory(prompt, data.content, "success");
          } else if (data.status === "error" || data.status === "timeout") {
            clearInterval(pollTimer);
            pollTimer = null;
            badge.className = "status status-error";
            badge.textContent = data.status === "timeout" ? "Timeout" : "Error";
            resultBox.textContent = data.content || "Unknown error";
            btn.disabled = false;
            addHistory(prompt, data.content || "Error", "error");
          }
        } catch (e) {}
      }, 1000);
    }

    function addHistory(prompt, response, status) {
      const container = document.getElementById("history");
      if (container.querySelector("p")) container.innerHTML = "";

      const item = document.createElement("div");
      item.className = `history-item ${status}`;
      item.innerHTML = `
        <div class="prompt">Q: ${escapeHtml(prompt.substring(0, 200))}</div>
        <div class="response">${escapeHtml(response.substring(0, 500))}${response.length > 500 ? "..." : ""}</div>
      `;
      container.insertBefore(item, container.firstChild);
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    checkConnection();
  </script>
</body>
</html>
